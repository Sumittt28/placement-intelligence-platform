    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://postgres.qtfellkffpbiamssfufg:REDACTED_PASSWORD@aws-1-ap-south-1.pooler.supabase.com:5432/postgres
