# ============================================================
# Render Deployment Configuration
# ============================================================
# IMPORTANT: All sensitive values must be set via Render Dashboard
# (Environment > Secret Files / Environment Variables)
# NEVER commit actual credentials to this file.
# ============================================================

services:
  - type: web
    name: placement-intel-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Database — set actual value in Render Dashboard
      - key: DATABASE_URL
        sync: false  # Must be set manually in Render Dashboard
      # Supabase — set actual values in Render Dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Auth — auto-generated secure secret
      - key: JWT_SECRET
        generateValue: true
      # AI Provider — Groq (primary)
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false   # Set this manually in Render Dashboard → Environment Variables
      - key: GROQ_MODEL_SMART
        value: llama-3.3-70b-versatile
      - key: GROQ_MODEL_FAST
        value: llama-3.1-8b-instant
      # Gemini (legacy — no longer used)
      - key: GEMINI_API_KEY
        sync: false
      # Redis — set actual value in Render Dashboard (or leave empty to disable Celery)
      - key: REDIS_URL
        sync: false
      # App config
      - key: CORS_ORIGINS
        value: https://frontend-sigma-smoky-65.vercel.app,http://localhost:3000
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.3"
    healthCheckPath: /health
